<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연세서울로심리상담센터</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    *, body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; }
    :root {
      --blue-deep: #002D6E;
      --blue-mid: #1A4FA0;
      --blue-soft: #EEF3FB;
      --accent: #4A7FD4;
      --text-dark: #1A1E2E;
      --text-mid: #4B5369;
      --text-light: #8A93AD;
      --border: #E2E8F4;
      --white: #FFFFFF;
      --bg: #F7F9FD;
    }
    body { background: var(--bg); color: var(--text-dark); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes floatY { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
    .anim-fade { animation: fadeIn 0.6s ease both; }
    .anim-up   { animation: fadeUp 0.55s ease both; }
    .float     { animation: floatY 3s ease-in-out infinite; }
    .nav-active   { color:var(--blue-deep)!important; background:var(--blue-soft); border-radius:8px; padding:6px 14px; }
    .nav-inactive { color:var(--text-mid); padding:6px 14px; border-radius:8px; transition:background .2s,color .2s; }
    .nav-inactive:hover { background:var(--blue-soft); color:var(--blue-deep); }
    .card { background:var(--white); border:1px solid var(--border); border-radius:20px; transition:box-shadow .2s,transform .2s; }
    .card:hover { box-shadow:0 8px 32px rgba(0,45,110,.09); transform:translateY(-2px); }
    .btn-primary { background:var(--blue-deep); color:white; border-radius:10px; font-weight:700; padding:13px 28px; display:inline-flex; align-items:center; gap:8px; transition:background .2s,box-shadow .2s; text-decoration:none; border:none; cursor:pointer; font-size:15px; }
    .btn-primary:hover { background:var(--blue-mid); box-shadow:0 4px 16px rgba(0,45,110,.25); }
    .btn-outline { background:transparent; color:var(--blue-deep); border:1.5px solid var(--blue-deep); border-radius:10px; font-weight:700; padding:12px 28px; display:inline-flex; align-items:center; gap:8px; transition:background .2s; text-decoration:none; font-size:15px; }
    .btn-outline:hover { background:var(--blue-soft); }
    .label-tag { display:inline-block; background:var(--blue-soft); color:var(--blue-mid); font-size:12px; font-weight:700; letter-spacing:.08em; padding:5px 14px; border-radius:100px; margin-bottom:18px; }
    .info-row { display:flex; justify-content:space-between; align-items:center; padding:16px 0; border-bottom:1px solid var(--border); }
    .info-row:last-child { border-bottom:none; }
    .map-area { background:linear-gradient(135deg,#EEF3FB 0%,#dce8f8 100%); border-radius:16px; height:360px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; cursor:pointer; }
    .map-area::before { content:''; position:absolute; inset:0; background-image:radial-gradient(var(--accent) 1px,transparent 0); background-size:28px 28px; opacity:.06; }
    .quote-card { background:linear-gradient(135deg,#1A4FA0 0%,#002D6E 100%); border-radius:20px; padding:48px; color:white; position:relative; overflow:hidden; }
    .quote-card::before { content:''; position:absolute; top:-60px; right:-60px; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,.04); }
    .quote-card::after  { content:''; position:absolute; bottom:-40px; left:-40px; width:140px; height:140px; border-radius:50%; background:rgba(255,255,255,.03); }
    .footer-bg { background:#0F1929; }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const Icon = ({ name, size=20, color='currentColor', fill='none', style={}, className='' }) => {
      const s = { display:'inline-block', verticalAlign:'middle', flexShrink:0 };
      const icons = {
        Menu:          <svg style={s} width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
        X:             <svg style={s} width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
        Clock:         <svg style={s} width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
        MapPin:        <svg style={s} width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
        Phone:         <svg style={s} width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
        ChevronRight:  <svg style={s} width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
        Quote:         <svg style={s} width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>,
        Heart:         <svg style={s} width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
        Award:         <svg style={s} width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>,
        Users:         <svg style={s} width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
        MessageCircle: <svg style={s} width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
        ExternalLink:  <svg style={s} width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
        Share2:        <svg style={s} width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
        BookOpen:      <svg style={s} width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
        GraduationCap: <svg style={s} width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>,
      };
      return icons[name] || null;
    };

    const Logo = ({ dim }) => (
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <svg width="38" height="38" viewBox="0 0 100 100" fill="none">
          <rect x="5" y="5" width="70" height="70" rx="15" fill={dim?'#444':'#002D6E'} />
          <path d="M75 15C85 15 95 25 95 45C95 65 85 85 65 95C65 85 70 75 75 65L75 15Z" fill={dim?'#777':'#4A7FD4'} />
          <circle cx="25" cy="30" r="4" fill="white" />
          <circle cx="55" cy="30" r="4" fill="white" />
          <path d="M25 45Q40 55 55 45" stroke="white" strokeWidth="4" strokeLinecap="round" fill="none" />
        </svg>
        <div style={{ display:'flex', flexDirection:'column', lineHeight:1.15 }}>
          <span style={{ fontWeight:800, fontSize:16, color:dim?'#888':'#002D6E', letterSpacing:'-0.02em' }}>연세서울로</span>
          <span style={{ fontWeight:500, fontSize:11, color:dim?'#666':'#4B5369', letterSpacing:'0.04em' }}>심리상담센터</span>
        </div>
      </div>
    );

    const App = () => {
      const [activeTab, setActiveTab] = useState('intro');
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const navItems = [
        { id:'intro',       label:'센터 소개' },
        { id:'services',    label:'이용 내용' },
        { id:'reservation', label:'이용안내/예약' },
      ];

      return (
        <div style={{ minHeight:'100vh' }}>

          {/* NAV */}
          <nav style={{ position:'sticky', top:0, zIndex:50, background:'rgba(255,255,255,0.96)', backdropFilter:'blur(12px)', borderBottom:'1px solid var(--border)', boxShadow:'0 1px 12px rgba(0,45,110,.06)' }}>
            <div style={{ maxWidth:1100, margin:'0 auto', padding:'0 24px', display:'flex', alignItems:'center', justifyContent:'space-between', height:68 }}>
              <div onClick={() => setActiveTab('intro')} style={{ cursor:'pointer' }}><Logo /></div>
              <div className="hidden md:flex" style={{ gap:4, alignItems:'center' }}>
                {navItems.map(item => (
                  <button key={item.id} onClick={() => setActiveTab(item.id)}
                    className={activeTab===item.id ? 'nav-active' : 'nav-inactive'}
                    style={{ fontWeight:600, fontSize:14, border:'none', background:'none', cursor:'pointer' }}>
                    {item.label}
                  </button>
                ))}
                <a href="http://pf.kakao.com/_xixbJJxj/chat" target="_blank" rel="noopener noreferrer"
                  style={{ marginLeft:12, background:'#FEE500', color:'#3C1E1E', fontWeight:800, fontSize:13, padding:'9px 18px', borderRadius:8, textDecoration:'none', display:'flex', alignItems:'center', gap:6 }}>
                  <Icon name="MessageCircle" size={15} color="#3C1E1E" /> 상담 예약
                </a>
              </div>
              <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)} style={{ border:'none', background:'none', cursor:'pointer' }}>
                <Icon name={isMenuOpen?'X':'Menu'} size={24} color="var(--text-dark)" />
              </button>
            </div>
            {isMenuOpen && (
              <div style={{ background:'white', borderTop:'1px solid var(--border)', padding:'12px 24px 20px' }}>
                {navItems.map(item => (
                  <button key={item.id} onClick={() => { setActiveTab(item.id); setIsMenuOpen(false); }}
                    style={{ display:'block', width:'100%', textAlign:'left', padding:'12px 16px', borderRadius:10, border:'none', cursor:'pointer', fontWeight:600, fontSize:15, marginBottom:4,
                      background: activeTab===item.id ? 'var(--blue-soft)' : 'transparent',
                      color: activeTab===item.id ? 'var(--blue-deep)' : 'var(--text-mid)' }}>
                    {item.label}
                  </button>
                ))}
              </div>
            )}
          </nav>

          {/* MAIN */}
          <main style={{ maxWidth:1100, margin:'0 auto', padding:'56px 24px' }}>

            {/* TAB 1 센터 소개 */}
            {activeTab==='intro' && (
              <div className="anim-fade">
                <section style={{ textAlign:'center', marginBottom:72 }}>
                  <div className="label-tag">나라는 존재 자체로 행복한 세상을 꿈꿉니다</div>
                  <h1 style={{ fontSize:'clamp(28px,5vw,52px)', fontWeight:900, color:'var(--blue-deep)', letterSpacing:'-0.03em', lineHeight:1.15, marginBottom:20 }}>
                    연세서울로심리상담센터
                  </h1>
                  <p style={{ fontSize:17, color:'var(--text-mid)', maxWidth:560, margin:'0 auto', lineHeight:1.85 }}>
                    연세서울로심리상담센터는 상담, 교육, 심리 분야의 전문적 교육을 받은<br />
                    <strong style={{ color:'var(--blue-deep)', fontWeight:700 }}>석박사 상담 전문가</strong>들이 함께 운영하는 심리상담 전문 기관입니다.
                  </p>
                </section>

                <section style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))', gap:24, marginBottom:56 }}>
                  <div className="card" style={{ padding:40 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:32 }}>
                      <div style={{ background:'var(--blue-soft)', borderRadius:10, padding:8 }}>
                        <Icon name="Award" size={20} color="var(--blue-deep)" />
                      </div>
                      <h2 style={{ fontWeight:800, fontSize:18, color:'var(--text-dark)' }}>상담진 이력</h2>
                    </div>
                    {[
                      { icon:'GraduationCap', title:'연세대학교 일반대학원 교육학과(상담교육) / 심리학과 (상담심리)', sub:'석사 · 박사 학위 수여' },
                      { icon:'Award',         title:'한국상담심리학회 상담심리사 1급/2급', sub:'보건복지부 / 학회 공인 자격' },
                      { icon:'BookOpen',      title:'청소년상담사 / 전문상담교사 자격', sub:'' },
                    ].map((item, i) => (
                      <div key={i} style={{ display:'flex', gap:16, alignItems:'flex-start', marginBottom: i<2?28:0 }}>
                        <div style={{ background:'var(--blue-soft)', borderRadius:12, padding:10, flexShrink:0 }}>
                          <Icon name={item.icon} size={18} color="var(--blue-deep)" />
                        </div>
                        <div>
                          <p style={{ fontWeight:700, fontSize:15, color:'var(--text-dark)', marginBottom:3 }}>{item.title}</p>
                          {item.sub && <p style={{ fontSize:13, color:'var(--text-light)' }}>{item.sub}</p>}
                        </div>
                      </div>
                    ))}
                  </div>

                  <div className="quote-card">
                    <div style={{ position:'relative', zIndex:1 }}>
                      <Icon name="Quote" size={32} color="rgba(255,255,255,0.3)" />
                      <p style={{ marginTop:20, fontSize:17, fontWeight:300, lineHeight:1.9, color:'rgba(255,255,255,0.92)' }}>
                        "대학원 시절 함께했던 동료들이<br />
                        <span style={{ fontWeight:700, color:'#93BFFF' }}>서울역 인근</span>에 처음으로 둥지를 틀었습니다.<br />
                        책임감과 성실함으로 최선을 다하겠습니다."
                      </p>
                      <p style={{ marginTop:24, fontSize:13, fontWeight:600, letterSpacing:'0.12em', color:'rgba(255,255,255,0.45)' }}>
                        — 연세서울로 상담진 일동
                      </p>
                    </div>
                  </div>
                </section>

                <section style={{ background:'var(--white)', border:'1px solid var(--border)', borderRadius:20, padding:'40px 48px', textAlign:'center' }}>
                  <p style={{ fontSize:16, fontWeight:700, color:'var(--blue-deep)', marginBottom:6 }}>
                    🌈 연세서울로는 모든 사회적 소수자를 지지합니다.
                  </p>
                  <p style={{ fontSize:14, color:'var(--text-light)', marginBottom:28 }}>
                    다양성을 존중하며, 누구든 편안하게 상담받을 수 있는 공간을 만들어 갑니다.
                  </p>
                  <div style={{ display:'flex', gap:12, justifyContent:'center', flexWrap:'wrap' }}>
                    <button className="btn-primary" onClick={() => setActiveTab('reservation')}>
                      상담 예약 안내 <Icon name="ChevronRight" size={16} color="white" />
                    </button>
                    <a href="https://blog.naver.com/yonseiseoullo" target="_blank" rel="noopener noreferrer" className="btn-outline">
                      네이버 블로그 <Icon name="ExternalLink" size={15} color="var(--blue-deep)" />
                    </a>
                  </div>
                </section>
              </div>
            )}

            {/* TAB 2 이용 내용 */}
            {activeTab==='services' && (
              <div className="anim-up">
                <div style={{ textAlign:'center', marginBottom:56 }}>
                  <div className="label-tag">상담 안내</div>
                  <h2 style={{ fontSize:'clamp(24px,4vw,40px)', fontWeight:900, letterSpacing:'-0.03em', color:'var(--text-dark)', marginBottom:12 }}>
                    심리상담, 언제 필요할까요?
                  </h2>
                  <p style={{ fontSize:15, color:'var(--text-light)' }}>마음이 보내는 신호에 귀 기울여주세요.</p>
                </div>

                <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))', gap:16, marginBottom:48 }}>
                  {[
                    { icon:'Heart',         title:'심리적 어려움',    desc:'마음이 자꾸만 아프고 일상이 힘들게 느껴질 때' },
                    { icon:'Users',         title:'정서적 불안/우울', desc:'감정 조절이 어렵고 우울함이나 불안이 지속될 때' },
                    { icon:'Clock',         title:'수면 및 활력 저하', desc:'잠을 이루기 어렵고 이전처럼 생활하기 힘들 때' },
                    { icon:'MessageCircle', title:'관계의 갈등',       desc:'주변 사람들과 반복적인 문제가 생길 때' },
                  ].map((item, i) => (
                    <div key={i} className="card" style={{ padding:'28px' }}>
                      <div style={{ background:'var(--blue-soft)', borderRadius:12, padding:10, display:'inline-flex', marginBottom:16 }}>
                        <Icon name={item.icon} size={20} color="var(--blue-deep)" />
                      </div>
                      <h3 style={{ fontWeight:800, fontSize:16, color:'var(--text-dark)', marginBottom:8 }}>{item.title}</h3>
                      <p style={{ fontSize:14, color:'var(--text-mid)', lineHeight:1.7 }}>{item.desc}</p>
                    </div>
                  ))}
                </div>

                <div style={{ background:'var(--blue-soft)', borderRadius:20, padding:'48px', display:'flex', flexWrap:'wrap', gap:40, alignItems:'center' }}>
                  <div style={{ flex:'1 1 280px' }}>
                    <div className="label-tag">프로그램</div>
                    <h3 style={{ fontSize:'clamp(20px,3vw,32px)', fontWeight:900, color:'var(--blue-deep)', letterSpacing:'-0.02em', marginBottom:16, lineHeight:1.3 }}>
                      전문가와 함께하는<br />1:1 맞춤형 치유 과정
                    </h3>
                    <p style={{ fontSize:15, color:'var(--text-mid)', lineHeight:1.85, marginBottom:28 }}>
                      개인의 고유한 특성을 존중하며, 과학적이고 입증된 상담 기법을 통해
                      마음의 근본적인 원인을 찾고 건강한 변화를 이끌어냅니다.
                    </p>
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
                      {['개인 심리상담','청소년/성인 검사','정서 발달 지원','커플/가족 상담'].map((t,i) => (
                        <div key={i} style={{ background:'white', borderRadius:10, padding:'12px 16px', display:'flex', alignItems:'center', gap:10, border:'1px solid var(--border)' }}>
