<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연세서울로심리상담센터</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-deep: #002D6E;
      --blue-mid:  #1A4FA0;
      --blue-soft: #EEF3FB;
      --accent:    #4A7FD4;
      --text-dark: #1A1E2E;
      --text-mid:  #4B5369;
      --text-light:#8A93AD;
      --border:    #E2E8F4;
      --white:     #FFFFFF;
      --bg:        #F7F9FD;
      --radius:    16px;
      --gap:       16px;
    }
    html, body { font-family: 'Pretendard', -apple-system, sans-serif; color: var(--text-dark); -webkit-text-size-adjust: 100%; }

    /* 배경 이미지 — 자연/힐링 분위기 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -2;
      background-image: url('./bg.webp');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    /* 반투명 오버레이 — 카드/텍스트 가독성 확보 */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background: rgba(240, 246, 255, 0.87);
    }

    /* ── 애니메이션 ── */
    @keyframes fadeIn  { from{opacity:0}              to{opacity:1} }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes floatY  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    .anim-fade { animation: fadeIn  0.5s ease both; }
    .anim-up   { animation: fadeUp  0.5s ease both; }
    .float     { animation: floatY  3s ease-in-out infinite; }

    /* ── 공통 레이아웃 ── */
    .container  { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 20px; }
    .main-wrap  { padding: 28px 20px 72px; max-width: 1100px; margin: 0 auto; }

    /* 모바일 카드 간격 */
    .two-col    { display: flex; flex-direction: column; gap: 16px; }
    .gap-top    { margin-top: 16px; }

    /* 모바일에서 인용카드 위, 이력카드 아래로 순서 뒤집기 */
    .intro-card-cred  { order: 2; }
    .intro-card-quote { order: 1; }

    /* ── NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,0.80);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(226,232,244,0.6);
      box-shadow: 0 1px 10px rgba(0,45,110,.06);
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      height: 60px; padding: 0 16px;
    }
    .logo       { display:flex; align-items:center; gap:8px; cursor:pointer; text-decoration:none; }
    .logo-text  { display:flex; flex-direction:column; line-height:1.15; }
    .logo-main  { font-size:15px; font-weight:800; color:var(--blue-deep); letter-spacing:-.02em; }
    .logo-sub   { font-size:10px; font-weight:500; color:var(--text-mid); letter-spacing:.04em; }

    /* 데스크톱 nav 링크 */
    .nav-links  { display:none; gap:4px; align-items:center; }
    .nav-btn    { font-size:14px; font-weight:600; padding:6px 14px; border-radius:8px; border:none; background:none; cursor:pointer; color:var(--text-mid); transition:background .2s,color .2s; font-family:inherit; }
    .nav-btn:hover   { background:var(--blue-soft); color:var(--blue-deep); }
    .nav-btn.active  { background:var(--blue-soft); color:var(--blue-deep); }
    .nav-cta    { margin-left:8px; background:#FEE500; color:#3C1E1E; font-weight:800; font-size:13px; padding:9px 16px; border-radius:8px; text-decoration:none; display:flex; align-items:center; gap:5px; white-space:nowrap; }

    /* 햄버거 */
    .ham-btn    { border:none; background:none; cursor:pointer; padding:6px; color:var(--text-dark); display:flex; }
    .mobile-menu{ background:white; border-top:1px solid var(--border); padding:12px 16px 16px; }
    .mobile-nav-btn { display:block; width:100%; text-align:left; padding:13px 16px; border-radius:10px; border:none; cursor:pointer; font-weight:600; font-size:15px; margin-bottom:4px; font-family:inherit; transition:background .15s; }
    .mobile-nav-btn.active  { background:var(--blue-soft); color:var(--blue-deep); }
    .mobile-nav-btn:not(.active) { background:transparent; color:var(--text-mid); }

    /* ── 카드 ── */
    .card { background:rgba(255,255,255,0.82); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border:1px solid rgba(226,232,244,0.7); border-radius:var(--radius); }

    /* ── 라벨 태그 ── */
    .label-tag { display:inline-block; background:var(--blue-soft); color:var(--blue-mid); font-size:11px; font-weight:700; letter-spacing:.07em; padding:5px 13px; border-radius:100px; margin-bottom:14px; }

    /* ── 버튼 ── */
    .btn-primary { background:var(--blue-deep); color:white; border-radius:10px; font-weight:700; padding:14px 24px; display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none; cursor:pointer; font-size:15px; font-family:inherit; text-decoration:none; transition:background .2s; width:100%; }
    .btn-primary:hover { background:var(--blue-mid); }
    .btn-outline { background:transparent; color:var(--blue-deep); border:1.5px solid var(--blue-deep); border-radius:10px; font-weight:700; padding:13px 24px; display:inline-flex; align-items:center; justify-content:center; gap:8px; font-size:15px; font-family:inherit; text-decoration:none; transition:background .2s; width:100%; }
    .btn-outline:hover { background:var(--blue-soft); }
    .btn-row { display:flex; flex-direction:column; gap:10px; }

    /* ── 아이콘 박스 ── */
    .icon-box { background:var(--blue-soft); border-radius:10px; padding:9px; display:inline-flex; flex-shrink:0; }

    /* ── 섹션 헤더 ── */
    .section-head { text-align:center; margin-bottom:24px; }
    .section-head h1 { font-size:clamp(18px,4vw,32px); font-weight:900; color:var(--blue-deep); letter-spacing:-.03em; line-height:1.15; margin-bottom:0; }
    .section-head h2 { font-size:clamp(18px,4vw,32px); font-weight:900; letter-spacing:-.03em; line-height:1.2; margin-bottom:10px; color:var(--blue-deep); }
    .section-head p  { font-size:15px; color:var(--text-mid); line-height:1.8; }

    /* ── 상담진 이력 ── */
    .cred-item  { display:flex; gap:12px; align-items:flex-start; margin-bottom:18px; }
    .cred-item:last-child { margin-bottom:0; }
    .cred-check { width:22px; height:22px; border-radius:50%; background:var(--blue-deep); display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }
    .cred-title { font-weight:700; font-size:15px; color:var(--text-dark); margin-bottom:3px; }
    .cred-sub   { font-size:13px; color:var(--text-light); }

    /* 인용카드 안에서 이력 흰색 스타일 */
    .cred-check-white { width:22px; height:22px; border-radius:50%; background:rgba(255,255,255,0.25); display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }
    .cred-title-white { font-weight:700; font-size:15px; color:white; margin-bottom:3px; }
    .cred-sub-white   { font-size:13px; color:rgba(255,255,255,0.55); }

    /* ── 인용 카드 ── */
    .quote-card { background:linear-gradient(135deg,#4A7FD4 0%,#2557A7 100%); border-radius:var(--radius); padding:28px 24px; color:white; position:relative; overflow:hidden; }
    .quote-card::before { content:''; position:absolute; top:-50px; right:-50px; width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,.04); }
    .quote-text { font-size:15px; font-weight:300; line-height:1.9; color:rgba(255,255,255,.92); margin-top:14px; }
    .quote-by   { margin-top:18px; font-size:12px; font-weight:600; letter-spacing:.12em; color:rgba(255,255,255,.4); }

    /* ── CTA 섹션 ── */
    .cta-box { background:rgba(255,255,255,0.82); backdrop-filter:blur(10px); border:1px solid rgba(226,232,244,0.7); border-radius:var(--radius); padding:28px 20px; text-align:center; margin-top:16px; }
    .cta-box p { font-size:15px; font-weight:700; color:var(--blue-deep); margin-bottom:6px; }
    .cta-box small { font-size:13px; color:var(--text-light); display:block; margin-bottom:22px; line-height:1.6; }

    /* ── 서비스 카드 ── */
    .service-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
    .service-card { padding:18px 14px; }
    .service-card h3 { font-weight:800; font-size:14px; color:var(--text-dark); margin-bottom:5px; margin-top:10px; }
    .service-card p  { font-size:12px; color:var(--text-mid); line-height:1.65; }

    /* ── 프로그램 박스 ── */
    .program-box { background:var(--blue-soft); border-radius:var(--radius); padding:24px 20px; margin-top:0; }
    .program-box h3 { font-size:clamp(18px,4vw,32px); font-weight:900; color:var(--blue-deep); letter-spacing:-.02em; line-height:1.3; margin-bottom:10px; }
    .program-box p  { font-size:14px; color:var(--text-mid); line-height:1.85; margin-bottom:18px; }
    .program-tags { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .program-tag  { background:white; border-radius:10px; padding:11px 12px; display:flex; align-items:center; gap:8px; border:1px solid var(--border); font-weight:600; font-size:13px; color:var(--blue-deep); }
    .tag-dot { background:var(--blue-deep); border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

    /* ── 운영시간 ── */
    .info-row { display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid var(--border); }
    .info-row:last-child { border-bottom:none; }
    .time-label { font-size:14px; color:var(--text-mid); font-weight:500; }
    .time-value { font-size:15px; font-weight:800; color:var(--blue-deep); }
    .time-closed{ font-size:14px; font-weight:700; color:#E53E3E; background:#FFF5F5; padding:4px 11px; border-radius:6px; }
    .notice-box { margin-top:20px; background:var(--blue-soft); border-radius:12px; padding:14px 16px; font-size:13px; color:var(--blue-mid); font-weight:500; line-height:1.7; }

    /* ── 센터 정보 ── */
    .center-info { padding:24px; margin-bottom:12px; }
    .info-label  { font-size:10px; font-weight:700; color:var(--text-light); letter-spacing:.1em; text-transform:uppercase; margin-bottom:6px; }
    .info-addr   { font-weight:700; font-size:15px; line-height:1.65; color:var(--text-dark); margin-bottom:4px; }
    .info-sub    { font-size:12px; color:var(--accent); font-weight:600; }
    .info-tel    { font-weight:800; font-size:20px; color:var(--blue-deep); letter-spacing:-.02em; margin-bottom:4px; }
    .info-tel-sub{ font-size:12px; color:var(--text-light); }
    .info-grid   { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

    /* ── 예약 채널 ── */
    .channel-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; margin-top:14px; }
    .ch-kakao { background:#FEE500; border-radius:14px; padding:18px 14px; display:flex; flex-direction:column; gap:10px; }
    .ch-naver { background:#03C75A; border-radius:14px; padding:18px 14px; display:flex; flex-direction:column; gap:10px; color:white; }
    .ch-title-kakao { font-weight:800; font-size:13px; color:#3C1E1E; }
    .ch-title-naver { font-weight:800; font-size:13px; color:white; }
    .ch-desc-kakao  { font-size:11px; color:rgba(60,30,30,.65); font-weight:500; line-height:1.5; }
    .ch-desc-naver  { font-size:11px; color:rgba(255,255,255,.8); font-weight:500; line-height:1.5; }
    .ch-btn-kakao { background:#3C1E1E; color:white; font-weight:800; font-size:13px; padding:10px; border-radius:9px; text-decoration:none; text-align:center; display:flex; align-items:center; justify-content:center; gap:4px; }
    .ch-btn-naver { background:white; color:#03C75A; font-weight:800; font-size:13px; padding:10px; border-radius:9px; text-decoration:none; text-align:center; display:flex; align-items:center; justify-content:center; gap:4px; }
    .ch-icon-kakao { background:#3C1E1E; border-radius:7px; padding:5px; display:inline-flex; }
    .ch-icon-naver { background:white; border-radius:7px; padding:5px; display:inline-flex; }
    .ch-head { display:flex; align-items:center; gap:7px; }

    /* ── 지도 ── */
    .map-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; padding:0 4px; }
    .map-title  { font-weight:800; font-size:15px; color:var(--text-dark); }
    .map-link   { font-size:13px; font-weight:700; color:#03C75A; text-decoration:none; display:flex; align-items:center; gap:4px; }
    .map-area   { background:linear-gradient(135deg,#EEF3FB,#dce8f8); border-radius:14px; height:260px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; cursor:pointer; }
    .map-area::before { content:''; position:absolute; inset:0; background-image:radial-gradient(var(--accent) 1px,transparent 0); background-size:26px 26px; opacity:.06; }
    .map-pin-wrap { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:14px; }
    .map-pin-circle { background:white; border-radius:50%; padding:16px; box-shadow:0 8px 28px rgba(0,45,110,.15); }
    .map-label  { background:white; border-radius:12px; padding:12px 20px; text-align:center; box-shadow:0 4px 18px rgba(0,45,110,.10); border:1px solid var(--border); }
    .map-label p  { font-weight:800; font-size:15px; color:var(--blue-deep); }
    .map-label small { font-size:11px; color:var(--text-light); font-weight:500; margin-top:3px; display:block; }
    .map-hint   { font-size:10px; font-weight:700; color:var(--text-light); letter-spacing:.1em; text-transform:uppercase; }

    /* ── 푸터 ── */
    .footer { background:rgba(15,25,41,0.92); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); color:#8A99B8; padding:48px 16px 32px; }
    .footer-grid { display:grid; gap:36px; margin-bottom:36px; }
    .footer-logo { opacity:.55; margin-bottom:14px; }
    .footer-desc { font-size:13px; line-height:1.85; }
    .footer-h { font-weight:800; color:white; font-size:12px; margin-bottom:16px; letter-spacing:.1em; text-transform:uppercase; }
    .footer-contact { display:flex; flex-direction:column; gap:11px; font-size:13px; }
    .footer-contact-row { display:flex; align-items:flex-start; gap:9px; line-height:1.6; }
    .footer-social { display:flex; gap:8px; margin-bottom:20px; }
    .social-btn { font-weight:700; font-size:12px; padding:8px 14px; border-radius:8px; text-decoration:none; }
    .footer-legal { display:flex; gap:14px; font-size:12px; padding-top:16px; border-top:1px solid rgba(255,255,255,.07); }
    .footer-legal button { background:none; border:none; color:#8A99B8; cursor:pointer; font-family:inherit; font-size:12px; }
    .footer-copy { border-top:1px solid rgba(255,255,255,.06); padding-top:20px; text-align:center; font-size:10px; letter-spacing:.18em; text-transform:uppercase; opacity:.22; font-weight:600; }

    /* ── 데스크톱 (768px+) ── */
    @media (min-width: 768px) {
      .container  { padding: 0 32px; }
      .main-wrap  { padding: 56px 32px 80px; }
      .nav-inner  { height:68px; padding:0 32px; }
      .nav-links  { display:flex; }
      .ham-btn    { display:none; }
      .logo-main  { font-size:16px; }
      .logo-sub   { font-size:11px; }

      /* 두 컬럼 그리드 */
      .two-col    { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
      .three-col  { display:grid; grid-template-columns:1fr 1fr 1fr; gap:24px; }

      .btn-primary, .btn-outline { width:auto; }
      .btn-row { flex-direction:row; justify-content:center; }

      .section-head { margin-bottom:48px; }
      .section-head p { font-size:17px; }

      .cred-title { font-size:16px; }
      .quote-card { padding:48px; }
      .quote-text { font-size:18px; }

      .service-grid { grid-template-columns:1fr 1fr; gap:16px; }
      .service-card h3 { font-size:16px; }
      .service-card p  { font-size:14px; }

      .program-box { padding:48px; display:flex; gap:40px; align-items:center; }
      .program-box-text { flex:1 1 280px; }
      .program-float { flex:0 0 auto; display:flex; justify-content:center; }

      .center-info { padding:32px; }
      .info-tel    { font-size:22px; }

      .channel-grid { grid-template-columns:1fr 1fr; }
      .map-area     { height:360px; }

      /* PC에서는 원래 순서 유지 */
      .intro-card-cred  { order: 1; }
      .intro-card-quote { order: 2; }

      .footer { padding:64px 32px 40px; }
      .footer-grid { grid-template-columns:1.4fr 1fr 1fr; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState } = React;

  /* ── SVG 아이콘 ── */
  const I = ({ n, s=20, c='currentColor', f='none' }) => {
    const base = { display:'inline-block', verticalAlign:'middle', flexShrink:0 };
    const p = { xmlns:'http://www.w3.org/2000/svg', width:s, height:s, viewBox:'0 0 24 24', fill:f, stroke:c, strokeWidth:'2', strokeLinecap:'round', strokeLinejoin:'round', style:base };
